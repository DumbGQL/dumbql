name: Release

on:
  workflow_dispatch:
    inputs:
      type:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
          - alpha
          - beta
          - rc
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      - run: npm ci

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        id: version
        run: node scripts/version.mjs ${{ inputs.type }}

      - name: Read tag
        id: tag
        run: echo "name=$(git describe --tags --abbrev=0)" >> "$GITHUB_OUTPUT"

      - name: Verify npm auth
        run: npm whoami
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Clean dist and build packages
        run: |
          rm -rf dist/
          node scripts/build-packages.mjs

      - name: Verify version in dist
        run: |
          echo "Publish version:"
          for pkg in dist/dumbql/*/; do
            [ -f "${pkg}package.json" ] && node -p "require('${pkg}package.json').name + ' @ ' + require('${pkg}package.json').version"
          done

      - name: Publish to npm
        run: |
          TAG=${{ inputs.type }}
          if [ "$TAG" = "patch" ] || [ "$TAG" = "minor" ] || [ "$TAG" = "major" ]; then
            TAG="latest"
          fi
          for pkg in dist/dumbql/*/; do
            if [ -f "${pkg}package.json" ]; then
              name=$(node -p "require('${pkg}package.json').name")
              echo "Publishing $name with tag $TAG..."
              npm publish "$pkg" --access public --tag "$TAG"
            fi
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Push version bump commit and tags
        run: |
          git push origin "HEAD:${{ github.ref_name }}" --no-verify
          git push origin --tags --no-verify

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: ${{ steps.tag.outputs.name }}
          generate_release_notes: true
