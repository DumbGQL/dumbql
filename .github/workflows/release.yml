name: Release

on:
  push:
    branches:
      - rc
      - beta
      - alpha
  workflow_dispatch:
    inputs:
      version:
        description: 'Exact version (e.g. 0.0.3). Leave empty to auto-bump.'
        required: false
        default: ''
        type: string
      version_dev_server:
        description: 'Exact version for @dumbql/dev-server (e.g. 1.0.0). Overrides main version.'
        required: false
        default: ''
        type: string
      type:
        description: 'Version bump type (used only if "version" is empty)'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major
          - rc
          - beta
          - alpha
      tag_cache:
        description: '@dumbql/cache'
        default: 'latest'
        type: choice
        options: [latest, rc, beta, alpha, skip]
      tag_client:
        description: '@dumbql/client'
        default: 'latest'
        type: choice
        options: [latest, rc, beta, alpha, skip]
      tag_codegen:
        description: '@dumbql/codegen'
        default: 'latest'
        type: choice
        options: [latest, rc, beta, alpha, skip]
      tag_core:
        description: '@dumbql/core'
        default: 'latest'
        type: choice
        options: [latest, rc, beta, alpha, skip]
      tag_dev_server:
        description: '@dumbql/dev-server'
        default: 'rc'
        type: choice
        options: [latest, rc, beta, alpha, skip]
      tag_errors:
        description: '@dumbql/errors'
        default: 'latest'
        type: choice
        options: [latest, rc, beta, alpha, skip]
      tag_fragments:
        description: '@dumbql/fragments'
        default: 'latest'
        type: choice
        options: [latest, rc, beta, alpha, skip]
      tag_downloader:
        description: '@dumbql/downloader'
        default: 'latest'
        type: choice
        options: [latest, rc, beta, alpha, skip]
      tag_ssr:
        description: '@dumbql/ssr'
        default: 'latest'
        type: choice
        options: [latest, rc, beta, alpha, skip]
      tag_subscriptions:
        description: '@dumbql/subscriptions'
        default: 'latest'
        type: choice
        options: [latest, rc, beta, alpha, skip]
      tag_middlewares:
        description: '@dumbql/middlewares'
        default: 'latest'
        type: choice
        options: [latest, rc, beta, alpha, skip]
      tag_pagination:
        description: '@dumbql/pagination'
        default: 'latest'
        type: choice
        options: [latest, rc, beta, alpha, skip]
      tag_persisted_queries:
        description: '@dumbql/persisted-queries'
        default: 'latest'
        type: choice
        options: [latest, rc, beta, alpha, skip]
      tag_file_upload:
        description: '@dumbql/file-upload'
        default: 'latest'
        type: choice
        options: [latest, rc, beta, alpha, skip]
      tag_debugging:
        description: '@dumbql/debugging'
        default: 'latest'
        type: choice
        options: [latest, rc, beta, alpha, skip]
      tag_testing:
        description: '@dumbql/testing'
        default: 'latest'
        type: choice
        options: [latest, rc, beta, alpha, skip]
      tag_apollo_adapter:
        description: '@dumbql/apollo-adapter'
        default: 'latest'
        type: choice
        options: [latest, rc, beta, alpha, skip]
      tag_react:
        description: '@dumbql/react'
        default: 'latest'
        type: choice
        options: [latest, rc, beta, alpha, skip]
      tag_vue:
        description: '@dumbql/vue'
        default: 'latest'
        type: choice
        options: [latest, rc, beta, alpha, skip]
permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      - run: npm ci

      - name: Test + coverage
        run: npx vitest run --coverage --coverage.reporter=lcovonly --coverage.reporter=text

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          directory: ./coverage
          fail_ci_if_error: false
          verbose: true

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Resolve workflow inputs for push-triggered runs
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "BUMP_TYPE=${{ inputs.type }}" >> "$GITHUB_ENV"
            echo "EXACT_VERSION=${{ inputs.version }}" >> "$GITHUB_ENV"
            echo "DEV_SERVER_VERSION=${{ inputs.version_dev_server }}" >> "$GITHUB_ENV"

            echo "TAG_cache=${{ inputs.tag_cache }}" >> "$GITHUB_ENV"
            echo "TAG_client=${{ inputs.tag_client }}" >> "$GITHUB_ENV"
            echo "TAG_codegen=${{ inputs.tag_codegen }}" >> "$GITHUB_ENV"
            echo "TAG_core=${{ inputs.tag_core }}" >> "$GITHUB_ENV"
            echo "TAG_dev_server=${{ inputs.tag_dev_server }}" >> "$GITHUB_ENV"
            echo "TAG_errors=${{ inputs.tag_errors }}" >> "$GITHUB_ENV"
            echo "TAG_fragments=${{ inputs.tag_fragments }}" >> "$GITHUB_ENV"
            echo "TAG_downloader=${{ inputs.tag_downloader }}" >> "$GITHUB_ENV"
            echo "TAG_ssr=${{ inputs.tag_ssr }}" >> "$GITHUB_ENV"
            echo "TAG_subscriptions=${{ inputs.tag_subscriptions }}" >> "$GITHUB_ENV"
            echo "TAG_middlewares=${{ inputs.tag_middlewares }}" >> "$GITHUB_ENV"
            echo "TAG_pagination=${{ inputs.tag_pagination }}" >> "$GITHUB_ENV"
            echo "TAG_persisted_queries=${{ inputs.tag_persisted_queries }}" >> "$GITHUB_ENV"
            echo "TAG_file_upload=${{ inputs.tag_file_upload }}" >> "$GITHUB_ENV"
            echo "TAG_debugging=${{ inputs.tag_debugging }}" >> "$GITHUB_ENV"
            echo "TAG_testing=${{ inputs.tag_testing }}" >> "$GITHUB_ENV"
            echo "TAG_apollo_adapter=${{ inputs.tag_apollo_adapter }}" >> "$GITHUB_ENV"
            echo "TAG_react=${{ inputs.tag_react }}" >> "$GITHUB_ENV"
            echo "TAG_vue=${{ inputs.tag_vue }}" >> "$GITHUB_ENV"
          else
            BRANCH="${{ github.ref_name }}"
            echo "BUMP_TYPE=$BRANCH" >> "$GITHUB_ENV"
            echo "EXACT_VERSION=" >> "$GITHUB_ENV"
            echo "DEV_SERVER_VERSION=" >> "$GITHUB_ENV"

            echo "TAG_cache=$BRANCH" >> "$GITHUB_ENV"
            echo "TAG_client=$BRANCH" >> "$GITHUB_ENV"
            echo "TAG_codegen=$BRANCH" >> "$GITHUB_ENV"
            echo "TAG_core=$BRANCH" >> "$GITHUB_ENV"
            echo "TAG_dev_server=$BRANCH" >> "$GITHUB_ENV"
            echo "TAG_errors=$BRANCH" >> "$GITHUB_ENV"
            echo "TAG_fragments=$BRANCH" >> "$GITHUB_ENV"
            echo "TAG_downloader=$BRANCH" >> "$GITHUB_ENV"
            echo "TAG_ssr=$BRANCH" >> "$GITHUB_ENV"
            echo "TAG_subscriptions=$BRANCH" >> "$GITHUB_ENV"
            echo "TAG_middlewares=$BRANCH" >> "$GITHUB_ENV"
            echo "TAG_pagination=$BRANCH" >> "$GITHUB_ENV"
            echo "TAG_persisted_queries=$BRANCH" >> "$GITHUB_ENV"
            echo "TAG_file_upload=$BRANCH" >> "$GITHUB_ENV"
            echo "TAG_debugging=$BRANCH" >> "$GITHUB_ENV"
            echo "TAG_testing=$BRANCH" >> "$GITHUB_ENV"
            echo "TAG_apollo_adapter=$BRANCH" >> "$GITHUB_ENV"
            echo "TAG_react=$BRANCH" >> "$GITHUB_ENV"
            echo "TAG_vue=$BRANCH" >> "$GITHUB_ENV"
          fi

      - name: Bump version
        run: |
          if [ -n "$EXACT_VERSION" ]; then
            node scripts/version.mjs custom --version "$EXACT_VERSION"
          else
            node scripts/version.mjs "$BUMP_TYPE"
          fi

      - name: Set dev-server version (if specified)
        if: env.DEV_SERVER_VERSION != ''
        run: |
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('projects/dumbql/dev-server/package.json', 'utf-8'));
            pkg.version = '$DEV_SERVER_VERSION';
            fs.writeFileSync('projects/dumbql/dev-server/package.json', JSON.stringify(pkg, null, 2) + '\n');
            console.log('  @dumbql/dev-server → ' + pkg.version);
          "

      - name: Read tag
        id: tag
        run: echo "name=$(git describe --tags --abbrev=0)" >> "$GITHUB_OUTPUT"

      - name: Verify npm auth
        run: npm whoami
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Clean dist and build packages
        run: |
          rm -rf dist/
          node scripts/build-packages.mjs

      - name: Verify version in dist
        run: |
          echo "Publish version:"
          for pkg in dist/dumbql/*/; do
            [ -f "${pkg}package.json" ] && node -p "require('./${pkg}package.json').name + ' @ ' + require('./${pkg}package.json').version"
          done

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          declare -A TAG_MAP
          TAG_MAP["@dumbql/cache"]="$TAG_cache"
          TAG_MAP["@dumbql/client"]="$TAG_client"
          TAG_MAP["@dumbql/codegen"]="$TAG_codegen"
          TAG_MAP["@dumbql/core"]="$TAG_core"
          TAG_MAP["@dumbql/dev-server"]="$TAG_dev_server"
          TAG_MAP["@dumbql/errors"]="$TAG_errors"
          TAG_MAP["@dumbql/fragments"]="$TAG_fragments"
          TAG_MAP["@dumbql/downloader"]="$TAG_downloader"
          TAG_MAP["@dumbql/ssr"]="$TAG_ssr"
          TAG_MAP["@dumbql/subscriptions"]="$TAG_subscriptions"
          TAG_MAP["@dumbql/middlewares"]="$TAG_middlewares"
          TAG_MAP["@dumbql/pagination"]="$TAG_pagination"
          TAG_MAP["@dumbql/persisted-queries"]="$TAG_persisted_queries"
          TAG_MAP["@dumbql/file-upload"]="$TAG_file_upload"
          TAG_MAP["@dumbql/debugging"]="$TAG_debugging"
          TAG_MAP["@dumbql/testing"]="$TAG_testing"
          TAG_MAP["@dumbql/apollo-adapter"]="$TAG_apollo_adapter"
          TAG_MAP["@dumbql/react"]="$TAG_react"
          TAG_MAP["@dumbql/vue"]="$TAG_vue"
          for pkg in dist/dumbql/*/; do
            if [ -f "${pkg}package.json" ]; then
              name=$(node -p "require('./${pkg}package.json').name")
              tag="${TAG_MAP[$name]}"

              if [ "$tag" = "skip" ] || [ -z "$tag" ]; then
                echo "  ⏭️  Skipping $name"
                continue
              fi

              echo "  Publishing $name → tag: $tag"
              npm publish "$pkg" --access public --tag "$tag"
            fi
          done

      - name: Push version bump commit and tags
        run: |
          git push origin "HEAD:${{ github.ref_name }}" --no-verify
          git push origin --tags --no-verify

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: ${{ steps.tag.outputs.name }}
          body_path: CHANGELOG.md
