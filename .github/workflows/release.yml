name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Exact version (e.g. 0.0.3). Leave empty to auto-bump.'
        required: false
        default: ''
        type: string
      version_dev_server:
        description: 'Exact version for @dumbql/dev-server (e.g. 1.0.0). Overrides main version.'
        required: false
        default: ''
        type: string
      type:
        description: 'Version bump type (used only if "version" is empty)'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major
          - rc
          - beta
          - alpha
      tag_cache:
        description: '@dumbql/cache'
        default: 'latest'
        type: choice
        options: [latest, rc, skip]
      tag_client:
        description: '@dumbql/client'
        default: 'latest'
        type: choice
        options: [latest, rc, skip]
      tag_codegen:
        description: '@dumbql/codegen'
        default: 'latest'
        type: choice
        options: [latest, rc, skip]
      tag_core:
        description: '@dumbql/core'
        default: 'latest'
        type: choice
        options: [latest, rc, skip]
      tag_dev_server:
        description: '@dumbql/dev-server'
        default: 'rc'
        type: choice
        options: [latest, rc, skip]
      tag_errors:
        description: '@dumbql/errors'
        default: 'latest'
        type: choice
        options: [latest, rc, skip]
      tag_fragments:
        description: '@dumbql/fragments'
        default: 'latest'
        type: choice
        options: [latest, rc, skip]
      tag_downloader:
        description: '@dumbql/downloader'
        default: 'latest'
        type: choice
        options: [latest, rc, skip]
      tag_ssr:
        description: '@dumbql/ssr'
        default: 'latest'
        type: choice
        options: [latest, rc, skip]
      tag_subscriptions:
        description: '@dumbql/subscriptions'
        default: 'latest'
        type: choice
        options: [latest, rc, skip]
      tag_middlewares:
        description: '@dumbql/middlewares'
        default: 'latest'
        type: choice
        options: [latest, rc, skip]
      tag_pagination:
        description: '@dumbql/pagination'
        default: 'latest'
        type: choice
        options: [latest, rc, skip]
      tag_persisted_queries:
        description: '@dumbql/persisted-queries'
        default: 'latest'
        type: choice
        options: [latest, rc, skip]
      tag_file_upload:
        description: '@dumbql/file-upload'
        default: 'latest'
        type: choice
        options: [latest, rc, skip]
      tag_debugging:
        description: '@dumbql/debugging'
        default: 'latest'
        type: choice
        options: [latest, rc, skip]
      tag_testing:
        description: '@dumbql/testing'
        default: 'latest'
        type: choice
        options: [latest, rc, skip]
      tag_apollo_adapter:
        description: '@dumbql/apollo-adapter'
        default: 'latest'
        type: choice
        options: [latest, rc, skip]
      tag_react:
        description: '@dumbql/react'
        default: 'latest'
        type: choice
        options: [latest, rc, skip]
      tag_vue:
        description: '@dumbql/vue'
        default: 'latest'
        type: choice
        options: [latest, rc, skip]
permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      - run: npm ci

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            node scripts/version.mjs custom --version '${{ inputs.version }}'
          else
            node scripts/version.mjs ${{ inputs.type }}
          fi

      - name: Set dev-server version (if specified)
        if: inputs.version_dev_server != ''
        run: |
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('projects/dumbql/dev-server/package.json', 'utf-8'));
            pkg.version = '${{ inputs.version_dev_server }}';
            fs.writeFileSync('projects/dumbql/dev-server/package.json', JSON.stringify(pkg, null, 2) + '\n');
            console.log('  @dumbql/dev-server → ' + pkg.version);
          "

      - name: Read tag
        id: tag
        run: echo "name=$(git describe --tags --abbrev=0)" >> "$GITHUB_OUTPUT"

      - name: Verify npm auth
        run: npm whoami
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Clean dist and build packages
        run: |
          rm -rf dist/
          node scripts/build-packages.mjs

      - name: Verify version in dist
        run: |
          echo "Publish version:"
          for pkg in dist/dumbql/*/; do
            [ -f "${pkg}package.json" ] && node -p "require('./${pkg}package.json').name + ' @ ' + require('./${pkg}package.json').version"
          done

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          declare -A TAG_MAP
          TAG_MAP["@dumbql/cache"]="${{ inputs.tag_cache }}"
          TAG_MAP["@dumbql/client"]="${{ inputs.tag_client }}"
          TAG_MAP["@dumbql/codegen"]="${{ inputs.tag_codegen }}"
          TAG_MAP["@dumbql/core"]="${{ inputs.tag_core }}"
          TAG_MAP["@dumbql/dev-server"]="${{ inputs.tag_dev_server }}"
          TAG_MAP["@dumbql/errors"]="${{ inputs.tag_errors }}"
          TAG_MAP["@dumbql/fragments"]="${{ inputs.tag_fragments }}"
          TAG_MAP["@dumbql/downloader"]="${{ inputs.tag_downloader }}"
          TAG_MAP["@dumbql/ssr"]="${{ inputs.tag_ssr }}"
          TAG_MAP["@dumbql/subscriptions"]="${{ inputs.tag_subscriptions }}"
          TAG_MAP["@dumbql/middlewares"]="${{ inputs.tag_middlewares }}"
          TAG_MAP["@dumbql/pagination"]="${{ inputs.tag_pagination }}"
          TAG_MAP["@dumbql/persisted-queries"]="${{ inputs.tag_persisted_queries }}"
          TAG_MAP["@dumbql/file-upload"]="${{ inputs.tag_file_upload }}"
          TAG_MAP["@dumbql/debugging"]="${{ inputs.tag_debugging }}"
          TAG_MAP["@dumbql/testing"]="${{ inputs.tag_testing }}"
          TAG_MAP["@dumbql/apollo-adapter"]="${{ inputs.tag_apollo_adapter }}"
          TAG_MAP["@dumbql/react"]="${{ inputs.tag_react }}"
          TAG_MAP["@dumbql/vue"]="${{ inputs.tag_vue }}"
          for pkg in dist/dumbql/*/; do
            if [ -f "${pkg}package.json" ]; then
              name=$(node -p "require('./${pkg}package.json').name")
              tag="${TAG_MAP[$name]}"

              if [ "$tag" = "skip" ] || [ -z "$tag" ]; then
                echo "  ⏭️  Skipping $name"
                continue
              fi

              echo "  Publishing $name → tag: $tag"
              npm publish "$pkg" --access public --tag "$tag"
            fi
          done

      - name: Push version bump commit and tags
        run: |
          git push origin "HEAD:${{ github.ref_name }}" --no-verify
          git push origin --tags --no-verify

      - name: Generate release body
        id: changelog
        run: |
          export TAG="${{ steps.tag.outputs.name }}"
          export VER="${TAG#v}"
          export PREV_TAG="$(git tag --sort=-creatordate | head -2 | tail -1)"

          node --input-type=module -e "
            import { readFileSync, writeFileSync } from 'node:fs';
            import { execSync } from 'node:child_process';

            const ver = process.env.VER;
            const prevTag = process.env.PREV_TAG;
            const lines = readFileSync('CHANGELOG.md','utf-8').split('\n');

            let inside = false;
            const body = [];
            const headerRe = /^##\s+\[/;
            const escVer = ver.replace(/[.*+?^\${}()|[\\]\\\\]/g, '\\\\$&');
            const versionRe = new RegExp('^##\\\\s+\\\\[' + escVer + '\\\\]');

            for (const l of lines) {
              if (l.match(versionRe)) { inside = true; continue; }
              if (inside && l.match(headerRe)) break;
              if (inside) body.push(l);
            }

            let releaseBody = body.join('\n').trim();

            if (!releaseBody) {
              try {
                const cutoff = prevTag || '';
                const range = cutoff ? cutoff + '..HEAD' : '--all';
                const log = execSync('git log ' + range + ' --oneline --no-decorate', { encoding: 'utf-8' });
                const commits = log.trim().split('\n').filter(Boolean);
                const items = commits.map(c => {
                  const m = c.match(/^[\da-f]+\s+(.*)/);
                  return m ? '- ' + m[1] : '- ' + c;
                });
                const today = new Date().toISOString().slice(0, 10);
                releaseBody = '## [' + ver + '] — ' + today + '\n\n### Changed\n' + items.join('\n');
              } catch {
                releaseBody = 'No changelog entry found for ' + ver;
              }
            }

            writeFileSync('release_body.md', releaseBody);
          "

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: ${{ steps.tag.outputs.name }}
          body_path: release_body.md
