name: Release

on:
  workflow_dispatch:
    inputs:
      type:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
          - alpha
          - beta
          - rc
          - patch
          - minor
          - major
      stable_tag:
        description: 'npm dist-tag for all packages'
        required: true
        default: 'latest'
        type: string
      rc_packages:
        description: 'Packages to publish with "rc" tag instead of stable (one per line). Example: @dumbql/dev-server'
        required: false
        default: ''
        type: string
      skip_packages:
        description: 'Packages to skip entirely (one per line). Example: @dumbql/testing'
        required: false
        default: ''
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      - run: npm ci

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        id: version
        run: node scripts/version.mjs ${{ inputs.type }}

      - name: Read tag
        id: tag
        run: echo "name=$(git describe --tags --abbrev=0)" >> "$GITHUB_OUTPUT"

      - name: Verify npm auth
        run: npm whoami
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Clean dist and build packages
        run: |
          rm -rf dist/
          node scripts/build-packages.mjs

      - name: Verify version in dist
        run: |
          echo "Publish version:"
          for pkg in dist/dumbql/*/; do
            [ -f "${pkg}package.json" ] && node -p "require('./${pkg}package.json').name + ' @ ' + require('./${pkg}package.json').version"
          done

      - name: Publish to npm
        env:
          RC_PKGS: ${{ inputs.rc_packages }}
          SKIP_PKGS: ${{ inputs.skip_packages }}
          STABLE_TAG: ${{ inputs.stable_tag }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          # Read rc packages into array (strip whitespace, skip empty lines)
          RC_LIST=()
          if [ -n "$RC_PKGS" ]; then
            while IFS= read -r line; do
              line="$(echo "$line" | xargs)"
              [ -z "$line" ] && continue
              RC_LIST+=("$line")
            done <<< "$RC_PKGS"
          fi

          # Read skip packages into associative array
          declare -A SKIP_MAP
          if [ -n "$SKIP_PKGS" ]; then
            while IFS= read -r line; do
              line="$(echo "$line" | xargs)"
              [ -z "$line" ] && continue
              SKIP_MAP["$line"]=1
            done <<< "$SKIP_PKGS"
          fi

          for pkg in dist/dumbql/*/; do
            if [ -f "${pkg}package.json" ]; then
              name=$(node -p "require('./${pkg}package.json').name")

              # Skip?
              if [ "${SKIP_MAP[$name]}" = "1" ]; then
                echo "  ⏭️  Skipping $name"
                continue
              fi

              # Determine tag
              tag="$STABLE_TAG"
              for rc_pkg in "${RC_LIST[@]}"; do
                if [ "$rc_pkg" = "$name" ]; then
                  tag="rc"
                  break
                fi
              done

              echo "  Publishing $name → tag: $tag"
              npm publish "$pkg" --access public --tag "$tag"
            fi
          done

      - name: Push version bump commit and tags
        run: |
          git push origin "HEAD:${{ github.ref_name }}" --no-verify
          git push origin --tags --no-verify

      - name: Extract changelog entry
        id: changelog
        env:
          TAG: ${{ steps.tag.outputs.name }}
        run: |
          VER="${TAG#v}"
          node -e "
            const fs = require('fs');
            const c = fs.readFileSync('CHANGELOG.md','utf-8').split('\n');
            let s = false;
            const b = [];
            const re = new RegExp('^##\\\\s+\\\\[$VER\\\\]');
            for (const l of c) {
              const n = l.match(/^##\s+\[/);
              if (l.match(re)) { s = true; continue; }
              if (s && n) break;
              if (s) b.push(l);
            }
            fs.writeFileSync('release_body.md', b.join('\n').trim());
          "

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: ${{ steps.tag.outputs.name }}
          body_path: release_body.md
