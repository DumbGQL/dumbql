name: Release

on:
  push:
    branches:
      - rc
      - beta
      - alpha
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to release from'
        required: true
        default: 'main'
        type: choice
        options:

          - rc
          - beta
          - alpha
      version:
        description: 'Exact version (e.g. 0.0.3). Leave empty to auto-bump.'
        required: false
        default: ''
        type: string
      type:
        description: 'Version bump type (used only if "version" is empty)'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major
          - rc
          - beta
          - alpha
      npm_tag:
        description: 'npm dist-tag for all packages (auto = derived from version bump type)'
        default: 'auto'
        type: choice
        options: [auto, latest, rc, beta, alpha, skip]
      packages:
        description: |
          Per-package overrides. One per line.
          Format: <package-name>[:tag[:version]]
          Tag: latest|rc|beta|alpha|skip (skip = don't publish)
          Version: exact version override (optional)
          Examples:
            @dumbql/cache:rc
            @dumbql/opentelemetry:skip
            @dumbql/core:latest:1.0.6
        required: false
        default: ''
        type: string
permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch || github.ref_name }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      - run: npm ci

      - name: Test + coverage
        run: npx vitest run --coverage --coverage.reporter=lcovonly --coverage.reporter=text

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          directory: ./coverage
          fail_ci_if_error: false
          verbose: true

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Resolve workflow inputs for push-triggered runs
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "BUMP_TYPE=${{ inputs.type }}" >> "$GITHUB_ENV"
            echo "EXACT_VERSION=${{ inputs.version }}" >> "$GITHUB_ENV"

            # Derive npm tag: auto = follow version bump type
            NPM_TAG="${{ inputs.npm_tag }}"
            if [ "$NPM_TAG" = "auto" ]; then
              case "${{ inputs.type }}" in
                rc|beta|alpha) NPM_TAG="${{ inputs.type }}" ;;
                *) NPM_TAG="latest" ;;
              esac
            fi
            echo "NPM_TAG=$NPM_TAG" >> "$GITHUB_ENV"

            # Parse per-package config
            node -e "
              const raw = process.env.PACKAGES_RAW || '';
              const config = {};
              for (const line of raw.split('\n').map(l => l.trim()).filter(Boolean)) {
                const [name, tag, ver] = line.split(':');
                if (!name) continue;
                config[name] = { tag: tag || '', version: ver || '' };
              }
              require('fs').writeFileSync('packages-config.json', JSON.stringify(config));
            "
            echo "PACKAGES_CONFIG=packages-config.json" >> "$GITHUB_ENV"
          else
            BRANCH="${{ github.ref_name }}"
            # Extract base channel from branch: beta/v1.0.5 → beta
            CHANNEL="${BRANCH%%/*}"
            case "$CHANNEL" in
              main|rc|beta|alpha) ;;
              *) CHANNEL="$BRANCH" ;;
            esac
            echo "BUMP_TYPE=$CHANNEL" >> "$GITHUB_ENV"
            echo "EXACT_VERSION=" >> "$GITHUB_ENV"
            echo "NPM_TAG=$CHANNEL" >> "$GITHUB_ENV"
          fi
        env:
          PACKAGES_RAW: ${{ inputs.packages }}

      - name: Bump version
        run: |
          if [ -n "$EXACT_VERSION" ]; then
            node scripts/version.mjs custom --version "$EXACT_VERSION"
          else
            node scripts/version.mjs "$BUMP_TYPE"
          fi

          # Apply per-package version overrides
          if [ -f packages-config.json ]; then
            node -e "
              const config = JSON.parse(require('fs').readFileSync('packages-config.json', 'utf-8'));
              const fs = require('fs');
              const path = require('path');
              const dirs = fs.readdirSync('projects/dumbql');
              for (const dir of dirs) {
                const pkgPath = path.join('projects/dumbql', dir, 'package.json');
                if (!fs.existsSync(pkgPath)) continue;
                const pkg = JSON.parse(fs.readFileSync(pkgPath, 'utf-8'));
                const cfg = config[pkg.name];
                if (cfg && cfg.version) {
                  pkg.version = cfg.version;
                  fs.writeFileSync(pkgPath, JSON.stringify(pkg, null, 2) + '\n');
                  console.log('  ' + pkg.name + ' → ' + cfg.version + ' (override)');
                }
              }
            "
          fi

      - name: Read tag
        id: tag
        run: echo "name=$(git describe --tags --abbrev=0)" >> "$GITHUB_OUTPUT"

      - name: Verify npm auth
        run: npm whoami
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Clean dist and build packages
        run: |
          rm -rf dist/
          node scripts/build-packages.mjs

      - name: Verify version in dist
        run: |
          echo "Publish version:"
          for pkg in dist/dumbql/*/; do
            [ -f "${pkg}package.json" ] && node -p "require('./${pkg}package.json').name + ' @ ' + require('./${pkg}package.json').version"
          done

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          DEFAULT_TAG="$NPM_TAG"
          if [ "$DEFAULT_TAG" = "skip" ] || [ -z "$DEFAULT_TAG" ]; then
            echo "  ⏭️  Skipping all packages (NPM_TAG=skip)"
            exit 0
          fi

          for pkg in dist/dumbql/*/; do
            if [ -f "${pkg}package.json" ]; then
              name=$(node -p "require('./${pkg}package.json').name")

              TAG="$DEFAULT_TAG"
              PUBLISH=true

              if [ -f packages-config.json ]; then
                result=$(node -e "
                  const cfg = JSON.parse(require('fs').readFileSync('packages-config.json', 'utf-8'));
                  const entry = cfg[process.argv[1]];
                  if (entry && entry.tag === 'skip') process.exit(1);
                  console.log(entry && entry.tag ? entry.tag : process.argv[2]);
                " "$name" "$DEFAULT_TAG") && PUBLISH=true || PUBLISH=false
                if [ "$PUBLISH" = "true" ]; then
                  TAG="$result"
                fi
              fi

              if [ "$PUBLISH" = "false" ]; then
                echo "  ⏭️  Skipping $name (per-package config)"
                continue
              fi

              echo "  Publishing $name → tag: $TAG"
              npm publish "$pkg" --access public --tag "$TAG"
            fi
          done

      - name: Push version bump commit and tags
        run: |
          git push origin "HEAD:${{ github.ref_name }}" --no-verify
          git push origin --tags --no-verify

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: ${{ steps.tag.outputs.name }}
          body_path: CHANGELOG.md
