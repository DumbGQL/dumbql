<div
	class="dumbql-dots dumbql-dots-{{ size() }} dumbql-dots-{{ color() }}"
	role="status"
	[attr.aria-label]="ariaLabel()"
>
	<span class="dumbql-dots-dot"></span>
	<span class="dumbql-dots-dot"></span>
	<span class="dumbql-dots-dot"></span>
	@if (showLabel()) {
		<span class="dumbql-dots-label">{{ label() }}</span>
	}
</div>
