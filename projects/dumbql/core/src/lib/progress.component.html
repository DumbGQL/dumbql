<div
	class="dumbql-progress dumbql-progress-{{ size() }} dumbql-progress-{{ color() }}"
	[style.width]="width()"
	role="progressbar"
	[attr.aria-valuenow]="value()"
	[attr.aria-valuemin]="0"
	[attr.aria-valuemax]="100"
>
	<div class="dumbql-progress-track">
		<div
			class="dumbql-progress-fill"
			[style.width.%]="value()"
			[class.dumbql-progress-fill-indeterminate]="indeterminate()"
		></div>
	</div>
	@if (showLabel()) {
		<span class="dumbql-progress-label">{{ value() }}%</span>
	}
</div>
