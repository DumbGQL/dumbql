<div
	class="dumbql-skeleton dumbql-skeleton-{{ variant() }} dumbql-skeleton-{{ animation() }}"
	[style.width]="width()"
	[style.height]="height()"
	[attr.aria-label]="ariaLabel()"
	role="status"
>
	@switch (variant()) {
		@case ('text') {
			<div class="dumbql-skeleton-line" [style.width]="textWidth()"></div>
		}
		@case ('circle') {
			<div class="dumbql-skeleton-circle"></div>
		}
		@case ('rect') {
			<div class="dumbql-skeleton-rect"></div>
		}
		@case ('card') {
			<div class="dumbql-skeleton-card">
				<div class="dumbql-skeleton-card-img"></div>
				<div class="dumbql-skeleton-card-body">
					<div class="dumbql-skeleton-line dumbql-skeleton-line-title"></div>
					<div class="dumbql-skeleton-line"></div>
					<div class="dumbql-skeleton-line dumbql-skeleton-line-short"></div>
				</div>
			</div>
		}
		@case ('table') {
			<div class="dumbql-skeleton-table">
				@for (row of tableRows(); track row) {
					<div class="dumbql-skeleton-table-row">
						<div class="dumbql-skeleton-table-cell"></div>
						<div class="dumbql-skeleton-table-cell"></div>
						<div class="dumbql-skeleton-table-cell"></div>
					</div>
				}
			</div>
		}
		@case ('list') {
			<div class="dumbql-skeleton-list">
				@for (item of listItems(); track item) {
					<div class="dumbql-skeleton-list-item">
						<div class="dumbql-skeleton-circle dumbql-skeleton-circle-sm"></div>
						<div class="dumbql-skeleton-list-text">
							<div class="dumbql-skeleton-line dumbql-skeleton-line-title"></div>
							<div class="dumbql-skeleton-line dumbql-skeleton-line-short"></div>
						</div>
					</div>
				}
			</div>
		}
		@case ('paragraph') {
			<div class="dumbql-skeleton-paragraph">
				@for (line of paragraphLines(); track line) {
					<div class="dumbql-skeleton-line" [style.width]="line === paragraphLines() ? '60%' : '100%'"></div>
				}
			</div>
		}
	}
</div>
