<div
	class="dumbql-spinner dumbql-spinner-{{ size() }} dumbql-spinner-{{ color() }}"
	[attr.aria-label]="ariaLabel()"
	role="status"
>
	<svg viewBox="0 0 50 50" class="dumbql-spinner-svg">
		<circle class="dumbql-spinner-circle" cx="25" cy="25" r="20" fill="none" stroke-width="4" />
	</svg>
	@if (showLabel()) {
		<span class="dumbql-spinner-label">{{ label() }}</span>
	}
</div>
