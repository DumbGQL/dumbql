<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="bolt" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e94560"/>
      <stop offset="100%" stop-color="#ff6b6b"/>
    </linearGradient>
    <linearGradient id="circle" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#533483"/>
      <stop offset="100%" stop-color="#e94560"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="200" cy="200" r="190" fill="url(#bg)" stroke="url(#circle)" stroke-width="4"/>

  <!-- Stylized bolt/lightning -->
  <path d="M180 100 L140 200 L175 200 L160 300 L260 175 L215 175 L240 100 Z"
        fill="url(#bolt)" stroke="#fff" stroke-width="2" stroke-linejoin="round"/>

  <!-- Small orbiting dots (graph nodes) -->
  <circle cx="110" cy="130" r="6" fill="#e94560" opacity="0.8"/>
  <circle cx="290" cy="150" r="5" fill="#533483" opacity="0.8"/>
  <circle cx="260" cy="280" r="4" fill="#ff6b6b" opacity="0.8"/>
  <circle cx="130" cy="270" r="5" fill="#533483" opacity="0.8"/>

  <!-- Connecting lines (graph edges) -->
  <line x1="110" y1="130" x2="180" y2="100" stroke="#e94560" stroke-width="1.5" opacity="0.4"/>
  <line x1="290" y1="150" x2="240" y2="100" stroke="#533483" stroke-width="1.5" opacity="0.4"/>
  <line x1="260" y1="280" x2="160" y2="300" stroke="#ff6b6b" stroke-width="1.5" opacity="0.4"/>
  <line x1="130" y1="270" x2="160" y2="300" stroke="#533483" stroke-width="1.5" opacity="0.4"/>
  <line x1="110" y1="130" x2="140" y2="200" stroke="#e94560" stroke-width="1" opacity="0.3"/>
  <line x1="290" y1="150" x2="260" y2="175" stroke="#533483" stroke-width="1" opacity="0.3"/>

  <!-- Text: DumbQL -->
  <text x="200" y="355" text-anchor="middle" font-family="'Segoe UI', system-ui, -apple-system, sans-serif"
        font-size="52" font-weight="800" fill="#fff" letter-spacing="4">
    DumbQL
  </text>
</svg>
