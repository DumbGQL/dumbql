<tui-root>
  <header class="app-header">
    <a class="app-logo" routerLink="/">
      <app-logo size="icon" />
      <span class="app-name">DumbQL</span>
    </a>
    <nav class="app-nav">
      <a tuiLink routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">Home</a>
      <a tuiLink routerLink="/docs" routerLinkActive="active">Docs</a>
      <a tuiLink routerLink="/playground" routerLinkActive="active">Playground</a>
      <a tuiLink href="https://github.com/DumbGQL/dumbql" target="_blank" rel="noopener">GitHub</a>
    </nav>
    <tui-textfield class="version-select" tuiTextfieldSize="s" [tuiTextfieldCleaner]="false">
      <input
        tuiComboBox
        readonly
        placeholder="v{{ versionService.currentVersion() }}"
        [ngModel]="versionService.currentVersion()"
        (ngModelChange)="versionService.setVersion($event)"
      />
      <tui-data-list-wrapper *tuiDropdown [items]="versionService.allVersions" />
    </tui-textfield>
    <button tuiButton appearance="secondary" size="s" class="theme-toggle" (click)="toggleTheme()">
      {{ isDarkMode() ? '☀️' : '🌙' }}
    </button>
  </header>
  <main class="app-main">
    <router-outlet />
  </main>
  <footer class="app-footer">
    <span>DumbQL — GraphQL for the rest of us</span>
  </footer>
</tui-root>
