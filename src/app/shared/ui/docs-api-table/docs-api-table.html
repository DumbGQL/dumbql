<table class="api-table">
	<thead>
		<tr>
			<th>Binding</th>
			<th>Description</th>
			<th>Type</th>
			<th>Default</th>
		</tr>
	</thead>
	<tbody>
		@for (entry of entries(); track entry.name) {
			<tr>
				<td>
					<code>{{ entry.name }}</code>
				</td>
				<td>{{ entry.description }}</td>
				<td>
					<code>{{ entry.type }}</code>
				</td>
				<td>
					@if (entry.default) {
						<code>{{ entry.default }}</code>
					}
				</td>
			</tr>
		}
	</tbody>
</table>
